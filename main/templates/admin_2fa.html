<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АБИС — Двухфакторная аутентификация</title>
    {% load static %}
    <link rel="icon" type="image/svg+xml" href="{% static 'main/images/background.svg' %}">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'main/css/base.css' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            max-width: 420px;
            width: 90%;
            margin: 20px auto;
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .auth-container:hover {
            transform: translateY(-2px);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 36px;
        }
        .auth-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .auth-header p {
            color: #6b7280;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 28px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
            color: #1f2937;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-family: 'Manrope', monospace;
            font-size: 20px;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 600;
            transition: all 0.2s;
            background: #f9fafb;
        }
        .form-group input:focus {
            outline: none;
            border-color: #155DFC;
            background: white;
            box-shadow: 0 0 0 3px rgba(21, 93, 252, 0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #155DFC 0%, #0e3ca0 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(21, 93, 252, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(21, 93, 252, 0.4);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
            border-left: 4px solid #ef4444;
        }
        .info-message {
            background: #dbeafe;
            color: #1e3a8a;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
            border-left: 4px solid #155DFC;
        }
        .input-hint {
            text-align: center;
            margin-top: 12px;
            font-size: 12px;
            color: #9ca3af;
        }
        @media (max-width: 480px) {
            .auth-container {
                padding: 32px 24px;
            }
            .auth-header h1 {
                font-size: 24px;
            }
            .form-group input {
                font-size: 18px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Двухфакторная аутентификация</h1>
            <p>Введите код из письма для подтверждения входа</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="error-message">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; margin-right: 6px;">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="code">Код подтверждения</label>
                <input type="text" id="code" name="code" 
                       maxlength="6" pattern="\d{6}" 
                       inputmode="numeric" autocomplete="one-time-code" 
                       placeholder="000000" required>
                <div class="input-hint">
                    Код отправлен на вашу электронную почту
                </div>
            </div>
            <button type="submit" class="btn-primary">Подтвердить</button>
        </form>
    </div>
</body>
</html>
